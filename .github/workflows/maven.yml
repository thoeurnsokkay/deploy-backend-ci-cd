name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3️⃣ Make mvnw executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      # 4️⃣ Build & Test
      - name: Build and Test
        run: ./mvnw clean verify

      # 5️⃣ Build & Push Docker Image to GHCR using Jib
      - name: Build and Push Docker Image
        run: |
          ./mvnw jib:build \
            -Djib.to.image=ghcr.io/${{ github.repository_owner }}/booknow-api:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ Trigger Render Deployment
      - name: Trigger Render Deployment
        if: success()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}